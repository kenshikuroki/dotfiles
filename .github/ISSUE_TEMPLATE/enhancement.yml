name: Enhancement
description: 機能追加・改善用テンプレート
title: ""
labels: [enhancement]
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 簡単な説明
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: 必要性
    validations:
      required: true
  - type: textarea
    id: to-be
    attributes:
      label: 理想（To be）
      description: 実現したい理想の状態やゴール
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: 準備（Requirements）
      description: 必要な前提条件や決めるべき事
    validations:
      required: false
  - type: textarea
    id: related-src
    attributes:
      label: 関連ソース（Related src）
      description: 関連するソースコードやファイル
    validations:
      required: false
  - type: textarea
    id: actions
    attributes:
      label: 対応案（Actions）
      description: 対応する流れやアクション
    validations:
      required: false
  - type: textarea
    id: others
    attributes:
      label: その他・備考
      description: その他、補足事項や備考
    validations:
      required: false
